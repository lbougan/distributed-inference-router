services:
  mock-1:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mock
    environment:
      - INSTANCE_ID=mock-1
      - PORT=8000
      - BASE_LATENCY_MS=40
      - LATENCY_STDDEV_MS=10
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 3

  mock-2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mock
    environment:
      - INSTANCE_ID=mock-2
      - PORT=8000
      - BASE_LATENCY_MS=60
      - LATENCY_STDDEV_MS=20
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 3

  mock-3:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mock
    environment:
      - INSTANCE_ID=mock-3
      - PORT=8000
      - BASE_LATENCY_MS=80
      - LATENCY_STDDEV_MS=25
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 3

  router:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.router
    volumes:
      - ./router-config.yaml:/etc/inference-router/config.yaml:ro
    ports:
      - "8080:8080"
    depends_on:
      mock-1:
        condition: service_healthy
      mock-2:
        condition: service_healthy
      mock-3:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
